name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.0)'
        required: true
        type: string

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build Release Artifacts
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Extract version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF##*/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch'
        id: version-input
        shell: bash
        run: echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore ResHog.sln

      - name: Publish Service
        run: |
          dotnet publish src/ResHog.Service -c Release -r win-x64 --self-contained true `
            -p:Version=${{ steps.version.outputs.version || steps.version-input.outputs.version }} `
            -o publish/service

      - name: Publish UI Client
        run: |
          dotnet publish src/ResHog.UI -c Release -r win-x64 --self-contained true `
            -p:Version=${{ steps.version.outputs.version || steps.version-input.outputs.version }} `
            -o publish/ui

      - name: Prepare release package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version || steps.version-input.outputs.version }}"
          $releaseDir = "release/ResHog-$version-win-x64"
          New-Item -ItemType Directory -Force -Path $releaseDir

          # 复制服务端
          Copy-Item -Path "publish/service/*" -Destination $releaseDir -Recurse

          # 复制客户端到子目录
          New-Item -ItemType Directory -Force -Path "$releaseDir/ui"
          Copy-Item -Path "publish/ui/*" -Destination "$releaseDir/ui" -Recurse

          # 复制部署脚本
          Copy-Item -Path "deploy/install.ps1" -Destination $releaseDir
          Copy-Item -Path "deploy/uninstall.ps1" -Destination $releaseDir
          Copy-Item -Path "deploy/appsettings.template.json" -Destination $releaseDir

          # 复制 README 和 LICENSE
          Copy-Item -Path "README.md" -Destination $releaseDir
          Copy-Item -Path "LICENSE" -Destination $releaseDir

          # 打包
          Compress-Archive -Path "$releaseDir/*" -DestinationPath "release/ResHog-$version-win-x64.zip" -Force

          # 生成 SHA256
          $hash = (Get-FileHash "release/ResHog-$version-win-x64.zip" -Algorithm SHA256).Hash
          "$hash  ResHog-$version-win-x64.zip" | Out-File -FilePath "release/ResHog-$version-win-x64.zip.sha256" -Encoding ASCII

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ResHog-release
          path: release/*.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/ResHog-*.zip
            release/ResHog-*.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
