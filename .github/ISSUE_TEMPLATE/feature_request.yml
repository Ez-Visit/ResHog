name: ✨ 功能请求
description: 提出一个新功能建议
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的功能建议！请详细描述你的需求，帮助我们理解你的使用场景。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 前置检查
      options:
        - label: 我已搜索了现有的 Issues，确认这不是重复请求
          required: true
        - label: 这个功能与 ResHog 的定位一致（Windows 资源监控与分析）
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 你遇到了什么问题？现有功能无法满足什么需求？
      placeholder: "例如：我想知道哪个进程在过去一周内磁盘写入量最大，但当前的 Top-N 只能按 CPU 排序"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望 ResHog 如何解决这个问题？
      placeholder: "例如：在 Top-N 排行中增加磁盘 I/O 维度，支持按读/写速率或累计写入量排序"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过哪些替代方案？（其他工具、变通方法等）

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 这个功能对你有多重要？
      options:
        - 关键 — 没有它我无法使用 ResHog
        - 重要 — 有了会显著改善体验
        - 不错 — 锦上添花的功能
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 涉及组件
      options:
        - 采集服务 (新增监控指标)
        - 桌面客户端 (UI/交互改进)
        - HTTP API (新增接口)
        - 报告系统 (报告格式/内容)
        - 告警引擎 (告警规则)
        - 部署/安装
        - 其他
    validations:
      required: true

  - type: textarea
    id: mockup
    attributes:
      label: 设计草案
      description: 如果有 UI 相关的需求，可以描述界面布局或附上草图

  - type: textarea
    id: context
    attributes:
      label: 补充信息
