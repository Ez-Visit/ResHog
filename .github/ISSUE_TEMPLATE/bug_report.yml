name: 🐛 Bug 报告
description: 报告一个 Bug 帮助我们改进 ResHog
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间报告 Bug！请尽可能详细地填写以下信息，帮助我们快速定位问题。

  - type: checkboxes
    id: prerequisites
    attributes:
      label: 前置检查
      description: 提交前请确认已完成以下检查
      options:
        - label: 我已搜索了现有的 Issues，确认这不是重复问题
          required: true
        - label: 我正在使用最新版本的 ResHog
          required: true
        - label: 我已阅读了 [FAQ](https://github.com/ResHog/ResHog/blob/main/docs/faq.md) 文档
          required: true

  - type: input
    id: version
    attributes:
      label: ResHog 版本
      description: 在「设置 → 关于」中查看，或运行 `ResHog.UI.exe --version`
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统版本
      description: 运行 `winver` 查看版本号
      placeholder: "Windows 11 23H2 (build 22631.3737)"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 受影响的组件
      options:
        - 采集服务 (ResHog.Service)
        - 桌面客户端 (ResHog.UI)
        - HTTP API
        - 报告生成
        - 安装/卸载脚本
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述 Bug 是什么
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 详细描述如何复现这个问题
      placeholder: |
        1. 启动 ResHog 服务
        2. 打开 ResHog.UI
        3. 切换到「Top-N 排行」标签
        4. 选择时间范围为「最近 24 小时」
        5. 界面显示空白，控制台报错...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志文件
      description: |
        请附上相关日志。日志路径：`%PROGRAMDATA%\ResHog\logs\`
        可直接拖拽文件到此处，或粘贴关键日志片段。
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果有截图，请拖拽到此处

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 任何其他有助于诊断的信息（特殊配置、运行环境等）
